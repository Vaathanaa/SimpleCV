<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: "Segoe UI", Tahoma, Arial, sans-serif;
                background: #f5f5f5;
                color: #222;
                padding: 20px;
            }

            .page-container {
                max-width: 900px;
                margin: 0 auto;
            }

            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 14px;
            }

            .page-header h1 {
                margin: 0;
                font-size: 1.5rem;
            }

            .dashboard-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 12px;
            }

            .card {
                background: #fff;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 12px;
            }

            .card h2 {
                margin: 0 0 8px;
                font-size: 1.05rem;
            }

            .card p {
                margin: 0;
                font-size: 0.95rem;
            }

            .total-staff {
                border-left: 4px solid #d9534f;
            }

            .total-patients {
                border-left: 4px solid #f0ad4e;
            }

            .bed-availability {
                border-left: 4px solid #337ab7;
            }

            .users-card {
                grid-column: 1 / -1;
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .actions a {
                text-decoration: none;
                border: 1px solid #ccc;
                border-radius: 6px;
                background: #fff;
                color: #222;
                padding: 6px 10px;
            }

            .actions a:hover {
                background: #eee;
            }
        </style>
</head>
<body>
        <main class="page-container">
            <header class="page-header">
                <h1>Admin Dashboard</h1>
            </header>

            <section class="dashboard-grid">
                <article class="card total-staff">
                    <h2>Total Staff</h2>
                    <p>2</p>
                </article>

                <article class="card total-patients">
                    <h2>Total Patients</h2>
                    <p>10</p>
                </article>

                <article class="card bed-availability">
                    <h2>Available Beds</h2>
                    <p>15</p>
                </article>

                <article class="card users-card">
                    <h2>Quick Actions</h2>
                    <div class="actions">
                        <a href="Nurse.html">View Nurse Page</a>
                        <a href="Landing.html">Go to Landing</a>
                        <a href="login.html">Logout</a>
                    </div>
                </article>
            </section>
        </main>
</body>
</html>
