<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: linear-gradient(135deg, #f4f7fb 0%, #e8eef7 100%);
        color: #1e293b;
      }

      .page-content {
        width: 100%;
        max-width: 680px;
        text-align: center;
        background: #df5050;
        border-radius: 14px;
        padding: 40px 28px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.3;
        color: #0f172a;
      }

      .subtitle {
        margin: 14px 0 0;
        font-size: 1.05rem;
        color: #475569;
      }

      .contact-information {
        margin-top: 24px;
        display: grid;
        gap: 8px;
      }

      .contact-information p {
        margin: 0;
        font-size: 0.98rem;
        color: #334155;
      }

      .back-to-landing-page {
        margin-top: 28px;
      }

      .back-to-landing-page a {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 10px;
        background: #2563eb;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.25s ease;
      }

      .back-to-landing-page a:hover {
        background: #1d4ed8;
      }
    </style>
</head>
<body>
    <div class="page-content">
        <h1>Welcome to our hospital</h1>
        <p class="subtitle">Please click the button below to login to your account.</p>

        <div class="contact-information">
            <p>Contact us at: vathana@gmail.com</p>
            <p>Phone: 123-456-7890</p>
        </div>

        <div class="back-to-landing-page">
            <a href="login.html">Login</a>
        </div>
    </div>
</body>
</html>
