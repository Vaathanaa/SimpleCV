<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin-top: 10px;
        margin-bottom: 10px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 16px;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: #e80000;
        color: #222;
      }

      .page-content {
        width: 100%;
        max-width: 420px;
        text-align: center;
        background: #fff;
        border-radius: 8px;
        padding: 26px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-top: 0;
        font-size: 28px;
        line-height: 1.2;
        color: #765e5e;
      }

      .subtitle {
        margin: 14px 0 0;
        font-size: 16px;
        color: #222;
      }

      .contact-information {
        margin-top: 24px;
        display: grid;
        gap: 8px;
      }

      .contact-information p {
        margin: 0;
        font-size: 15px;
        color: #222;
      }

      .back-to-landing-page {
        margin-top: 28px;
      }

      .back-to-landing-page a {
        display: inline-block;
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        background: #e80000;
        color: #ffffff;
        text-decoration: none;
        font-size: 16px;
      }

      .back-to-landing-page a:hover {
        background: #c70000;
      }
    </style>
</head>
<body>
    <div class="page-content">
        <h1>Welcome to our hospital</h1>
        <p class="subtitle">Please click the button below to login to your account.</p>

        <div class="contact-information">
            <p>Contact us at: vathana@gmail.com</p>
            <p>Phone: 123-456-7890</p>
        </div>

        <div class="back-to-landing-page">
            <a href="login.html">Login</a>
        </div>
    </div>
</body>
</html>
